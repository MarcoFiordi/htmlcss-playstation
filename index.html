<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playstation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"

    <link rel="stylesheet" href="./style.css/index.css">

<body>
    <!--TOP BAR-->
    <header>
        <div class="bg-dark py-2">
            <div class="container-fluid d-flex justify-content-end">
                <img src="img/sony_logo.svg" alt="Sony" class="sony-logo">
            </div>
        </div>
        <!--NAV BAR-->
        <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top">

                <a href="#" class="navbar-brand">
                    <img src="img/play_logo.svg" alt="playstation" class="ps-logo">
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#playstationMenu"
                    aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="playstationMenu">
                    <div class="collapse navbar-collapse" id="playstationMenu">
                        <!--MENU SINISTRA-->
                        <ul class="navbar-nav me-auto text-dark">
                            <li class="nav-item dropdown">
                                <a href="#" class="nav-link dropdown-toggle">Giochi</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a href="#" class="nav-link dropdown-toggle">Hardware</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a href="#" class="nav-link dropdown-toggle">Servizi</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a href="#" class="nav-link dropdown-toggle">News</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a href="#" class="nav-link dropdown-toggle">Fai aqcuisti</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a href="#" class="nav-link dropdown-toggle">Supporto</a>
                            </li>
                        </ul>
                        <!-- MENU DESTRA-->
                        <ul class="navbar-nav ms-auto align-items-center">
                            <li class="nav-item dropdown">
                                <a href="#" class="nav-link dropdown-toggle">My Playstation</a>
                            </li>
                            <li class="nav-item">
                                <a href="" class="btn btn-dark ms-lg-2">Accedi</a>
                            </li>
                            <li class="nav-item ms-lg-3">
                                <a href="#" class="nav-link p-0">
                                    <img src="img/lens.svg" alt="cerca" class="search-icon">
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <!--BANNER RETURNAL-->
        <section class="hero">
            <img src="img/jumbo-bg.png" alt="Returnal" class="hero-img">

            <div class="container hero-content">
                <img src="img/returnal-hero-banner-logo.png" alt="Returnal" class="hero-logo">

                <h2 class="hero-title text-white">Rompi il cerchio</h2>

                <p class="hero-text text-white">
                    Rialzati dopo ogni sconfitta e affronta una nuova sfida con ogni rinascita in questo esplosivo thriller fantascentifico, disponibile in esclusiva su ps5
                </p>

                <a href="#" class="btn btn-danger rounded-pill hero-btn">Acquista ora</a>
            </div>
        </section>




    </main>


















    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
